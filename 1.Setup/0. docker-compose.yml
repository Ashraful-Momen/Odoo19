services:
  postgres:
    image: postgres:16
    container_name: odoo19_postgres
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: odoo19_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@odoo.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_EMAIL_DELIVERABILITY_CHECK_ENABLED: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: odoo19_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
